# Claude Code 模型配置文件
# 格式：IS_DEFAULT|模型名称|API_BASE_URL|API_KEY_ENV_VAR|OPUS_MODEL(推理型)|SONNET_MODEL(常规型)|HAIKU_MODEL(快速型)
# 说明：
#   - IS_DEFAULT: 1=默认提供商, 0=非默认
#   - OPUS_MODEL: 用于复杂推理、计划模式、架构决策
#   - SONNET_MODEL: 用于代码生成、执行模式、日常任务
#   - HAIKU_MODEL: 用于快速响应、后台任务、简单操作

